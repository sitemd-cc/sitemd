<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  {{faviconHead}}
  <link rel="stylesheet" href="/theme/styles.css">
  {{themeStyles}}
  {{analytics}}
  {{seo}}
</head>
<body>
  {{gtmBody}}
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="site-header">
    <div class="header-inner">
      {{brand}}
      <nav class="site-nav" id="site-nav">
        {{nav}}
      </nav>
      <div class="header-actions">
        {{headerSearch}}
        <button class="theme-toggle" type="button" aria-label="Toggle theme">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-paper" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
        </button>
        <button class="mobile-menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main id="main" class="site-main{{sidebarClass}}">
    {{sidebarAside}}
    <article class="content">
      {{content}}
    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      {{footer}}
    </div>
  </footer>

  <div class="search-overlay" id="search-overlay" hidden>
    <div class="search-dialog" role="dialog" aria-modal="true" aria-label="Search">
      <div class="search-input-wrap">
        <svg class="search-input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="search" placeholder="Search..." aria-label="Search site" autocomplete="off">
      </div>
      <div class="search-results"></div>
      <div class="search-footer"><kbd>Esc</kbd> close <span class="search-footer-sep">&middot;</span> <kbd>&uarr;&darr;</kbd> navigate <span class="search-footer-sep">&middot;</span> <kbd>Enter</kbd> select</div>
    </div>
  </div>

  <script>
    // Theme toggle — cycles: light → dark → paper → light
    (function() {
      const themes = ['light', 'dark', 'paper'];
      const html = document.documentElement;
      const stored = localStorage.getItem('sitemd-theme');

      function setFavicon(theme) {
        var el = document.getElementById('favicon');
        if (el) el.href = '/favicon-' + theme + '.svg';
      }

      // Initialize theme — only auto-detect system preference when data-theme-auto is set
      if (stored && themes.includes(stored)) {
        html.setAttribute('data-theme', stored);
        setFavicon(stored);
      } else if (html.hasAttribute('data-theme-auto') && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        html.setAttribute('data-theme', 'dark');
        setFavicon('dark');
      }

      document.querySelector('.theme-toggle').addEventListener('click', function() {
        const current = html.getAttribute('data-theme') || 'light';
        const next = themes[(themes.indexOf(current) + 1) % themes.length];
        html.setAttribute('data-theme', next);
        localStorage.setItem('sitemd-theme', next);
        setFavicon(next);
      });
    })();

    // Mobile menu toggle
    (function() {
      const btn = document.querySelector('.mobile-menu-toggle');
      const nav = document.getElementById('site-nav');
      function setMenuOpen(open) {
        btn.setAttribute('aria-expanded', open);
        nav.classList.toggle('is-open', open);
        document.documentElement.classList.toggle('menu-open', open);
      }
      btn.addEventListener('click', function() {
        setMenuOpen(btn.getAttribute('aria-expanded') !== 'true');
      });
      // Auto-close mobile menu on link click
      nav.addEventListener('click', function(e) {
        if (e.target.closest('a')) setMenuOpen(false);
      });
    })();

    // Dropdown toggle on click (delegated for async-loaded nav)
    (function() {
      document.addEventListener('click', function(e) {
        var toggle = e.target.closest('.nav-group-toggle');
        if (toggle) {
          e.stopPropagation();
          var group = toggle.closest('.nav-group');
          var wasOpen = group.classList.contains('is-open');
          document.querySelectorAll('.nav-group.is-open').forEach(function(g) {
            g.classList.remove('is-open');
          });
          if (!wasOpen) group.classList.add('is-open');
          return;
        }
        // Close all open dropdowns on any other click (including link clicks inside)
        var clickedDropdownLink = e.target.closest('.nav-dropdown a');
        document.querySelectorAll('.nav-group.is-open').forEach(function(g) {
          g.classList.remove('is-open');
        });
        if (clickedDropdownLink) {
          var group = clickedDropdownLink.closest('.nav-group');
          if (group) {
            group.classList.add('no-hover');
            // Blur to kill :focus-within keeping dropdown visible after SPA nav
            if (document.activeElement) document.activeElement.blur();
            group.addEventListener('mouseleave', function handler() {
              group.classList.remove('no-hover');
              group.removeEventListener('mouseleave', handler);
            });
          }
        }
      });
    })();

    // Mobile sidebar — move into hamburger menu on small screens
    var updateMobileSidebar = (function() {
      var nav = document.getElementById('site-nav');
      var mq = window.matchMedia('(max-width: 768px)');
      var section = document.createElement('div');
      section.className = 'mobile-sidebar-section';
      var label = document.createElement('span');
      label.className = 'mobile-sidebar-label';
      label.textContent = 'In this section';
      section.appendChild(label);
      var currentSidebar = null;

      function update() {
        var sidebar = document.querySelector('.sidebar-aside');
        // Clean up if sidebar changed or disappeared
        if (currentSidebar && currentSidebar !== sidebar) {
          while (section.children.length > 1) section.children[1].remove();
          section.remove();
          currentSidebar = null;
        }
        if (!sidebar) return;
        currentSidebar = sidebar;
        if (mq.matches && section.parentNode !== nav) {
          while (sidebar.firstChild) section.appendChild(sidebar.firstChild);
          // Remove sidebar search — header search suffices on mobile
          var sSearch = section.querySelector('.sidebar-search');
          if (sSearch) sSearch.remove();
          nav.appendChild(section);
        } else if (!mq.matches && section.parentNode === nav) {
          while (section.children.length > 1) sidebar.appendChild(section.children[1]);
          section.remove();
        }
      }

      mq.addEventListener('change', update);
      update();
      return update;
    })();

    // Sidebar anchor expand/collapse
    function initSidebarAnchors() {
      document.querySelectorAll('.sidebar-anchors-toggle').forEach(function(btn) {
        if (btn._anchorsInit) return;
        btn._anchorsInit = true;
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var list = btn.closest('.sidebar-anchors').querySelector('.sidebar-anchors-list');
          var expanded = btn.getAttribute('aria-expanded') === 'true';
          btn.setAttribute('aria-expanded', !expanded);
          if (expanded) list.hidden = true;
          else list.removeAttribute('hidden');
        });
      });
    }

    function updateAnchorActive() {
      var hash = location.hash;
      var pathname = location.pathname;
      document.querySelectorAll('.sidebar-anchors-list a').forEach(function(a) {
        a.classList.toggle('active', a.getAttribute('href') === pathname + hash);
      });
      // Top-level sidebar anchor links (e.g. per-page sidebar with hash-only items)
      document.querySelectorAll('.sidebar-nav > a').forEach(function(a) {
        var href = a.getAttribute('href') || '';
        if (href.startsWith('#')) {
          a.classList.toggle('active', href === hash);
        }
      });
    }

    initSidebarAnchors();
    window.addEventListener('hashchange', updateAnchorActive);
    updateAnchorActive();
    updateAnchorActive();

    // Scroll active sidebar link into view on initial page load
    (function() {
      var sidebar = document.querySelector('.sidebar-aside');
      if (!sidebar) return;
      var activeLink = sidebar.querySelector('.sidebar-nav > a.active, .sidebar-anchors > a.active');
      if (activeLink) activeLink.scrollIntoView({ block: 'center' });
    })();

    // Dynamic sidebar scroll — only enable scrollbar when content overflows
    // Exposed as window fn so hydrate.js can re-trigger after SPA sidebar swaps
    window.initSidebarScroll = function() {
      var sidebar = document.querySelector('.sidebar-aside');
      if (!sidebar) return;
      function checkScroll() {
        sidebar.classList.toggle('has-scroll', sidebar.scrollHeight > sidebar.clientHeight);
      }
      checkScroll();
      if (!sidebar._sidemdScrollObserver) {
        sidebar._sitemdScrollObserver = new ResizeObserver(checkScroll);
        sidebar._sitemdScrollObserver.observe(sidebar);
      }
    };
    window.initSidebarScroll();

    // Copy-to-clipboard on code blocks
    function initCopyButtons() {
      document.querySelectorAll('pre code').forEach(function(block) {
        if (block.parentNode.querySelector('.copy-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.type = 'button';
        btn.textContent = 'Copy';
        btn.setAttribute('aria-label', 'Copy code to clipboard');
        btn.addEventListener('click', function() {
          navigator.clipboard.writeText(block.textContent).then(function() {
            btn.textContent = 'Copied';
            setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
          });
        });
        block.parentNode.style.position = 'relative';
        block.parentNode.appendChild(btn);
      });
    }
    initCopyButtons();

    // Rotated images — measure natural size then set wrapper to rotated bounds
    function initRotatedImages() {
      document.querySelectorAll('.img-rotate').forEach(function(wrap) {
        var deg = parseInt(wrap.getAttribute('data-rotate')) || 0;
        var img = wrap.querySelector('img');
        if (!img) return;
        function apply() {
          var w = img.naturalWidth;
          var h = img.naturalHeight;
          if (!w || !h) return;
          // Apply any max-width constraint from style
          var maxW = img.style.maxWidth ? parseInt(img.style.maxWidth) : Infinity;
          if (w > maxW) { h = h * (maxW / w); w = maxW; }
          var swap = (deg === 90 || deg === 270);
          var boxW = swap ? h : w;
          var boxH = swap ? w : h;
          // Scale so the rotated image fits within the content width
          var contentW = wrap.parentElement ? wrap.parentElement.clientWidth : w;
          if (boxW > contentW) { var s = contentW / boxW; boxW = contentW; boxH *= s; w *= s; h *= s; }
          wrap.style.width = boxW + 'px';
          wrap.style.height = boxH + 'px';
          img.style.position = 'absolute';
          img.style.left = ((boxW - w) / 2) + 'px';
          img.style.top = ((boxH - h) / 2) + 'px';
          img.style.width = w + 'px';
          img.style.height = h + 'px';
          img.style.maxWidth = 'none';
          img.style.transform = 'rotate(' + deg + 'deg)';
        }
        if (img.complete && img.naturalWidth) apply();
        else img.addEventListener('load', apply);
      });
    }
    initRotatedImages();

    // Forms
    function initForms() {
      document.querySelectorAll('.sitemd-form').forEach(function(form) {
        if (form._sitemdInit) return;
        form._sitemdInit = true;

        var webhook = form.getAttribute('data-webhook');
        var thankYouEl = form.querySelector('.form-thankyou');
        var redirectUrl = form.getAttribute('data-redirect') || '';
        var allPages = form.querySelectorAll('.form-page');
        var currentPageIdx = 0;
        var honeypotInput = form.querySelector('input[name="sitemd_hp"]');

        // URL prefill
        var params = new URLSearchParams(window.location.search);
        form.querySelectorAll('[data-prefill]').forEach(function(el) {
          var key = el.getAttribute('data-prefill');
          if (params.has(key)) {
            if (el.tagName === 'SELECT') el.value = params.get(key);
            else if (el.type === 'radio' || el.type === 'checkbox') el.checked = el.value === params.get(key);
            else el.value = params.get(key);
          }
        });

        // Conditional visibility
        function evalConditions() {
          form.querySelectorAll('[data-show-when],[data-show-when-any],[data-show-when-all]').forEach(function(el) {
            var show = true;
            var sw = el.getAttribute('data-show-when');
            if (sw) show = evalCond(sw);
            var swa = el.getAttribute('data-show-when-any');
            if (swa) show = swa.split(',').some(function(c) { return evalCond(c.trim()); });
            var swl = el.getAttribute('data-show-when-all');
            if (swl) show = swl.split(',').every(function(c) { return evalCond(c.trim()); });
            el.hidden = !show;
          });
        }

        function evalCond(cond) {
          var neq = cond.indexOf(' != ');
          var eq = cond.indexOf(' = ');
          if (neq !== -1) return getFieldValue(cond.slice(0, neq).trim()) !== cond.slice(neq + 4).trim();
          if (eq !== -1) return getFieldValue(cond.slice(0, eq).trim()) === cond.slice(eq + 3).trim();
          return false;
        }

        function getFieldValue(fieldId) {
          var input = form.querySelector('[name="' + fieldId + '"]');
          if (!input) return '';
          if (input.type === 'radio') {
            var checked = form.querySelector('[name="' + fieldId + '"]:checked');
            return checked ? checked.value : '';
          }
          if (input.type === 'checkbox') {
            var vals = [];
            form.querySelectorAll('[name="' + fieldId + '"]:checked').forEach(function(c) { vals.push(c.value); });
            return vals.join(',');
          }
          return input.value;
        }

        form.addEventListener('input', evalConditions);
        form.addEventListener('change', evalConditions);
        evalConditions();

        // Rating stars
        form.querySelectorAll('.form-rating').forEach(function(rating) {
          var stars = rating.querySelectorAll('.form-star');
          stars.forEach(function(star) {
            star.addEventListener('click', function() {
              var val = parseInt(star.getAttribute('data-value'));
              star.querySelector('input').checked = true;
              stars.forEach(function(s) {
                s.classList.toggle('active', parseInt(s.getAttribute('data-value')) <= val);
              });
            });
          });
        });

        // Validation
        function validatePage(pageEl) {
          var valid = true;
          pageEl.querySelectorAll('.form-field[data-required="true"]').forEach(function(field) {
            if (field.hidden || field.closest('[hidden]')) return;
            var err = field.querySelector('.form-error');
            var input = field.querySelector('input, select, textarea');
            var empty = false;

            if (!input) {
              // Composite fields — check all inputs
              var inputs = field.querySelectorAll('input, select');
              inputs.forEach(function(inp) {
                if (!inp.value.trim()) empty = true;
              });
            } else if (input.type === 'radio') {
              empty = !form.querySelector('[name="' + input.name + '"]:checked');
            } else {
              empty = !input.value.trim();
            }

            if (empty) {
              valid = false;
              field.classList.add('has-error');
              if (err) { err.textContent = 'This field is required'; err.hidden = false; }
            } else {
              // Check HTML5 validity (email pattern etc)
              if (input && !input.checkValidity()) {
                valid = false;
                field.classList.add('has-error');
                if (err) { err.textContent = input.validationMessage; err.hidden = false; }
              } else {
                field.classList.remove('has-error');
                if (err) err.hidden = true;
              }
            }
          });
          return valid;
        }

        // Clear errors on input
        form.addEventListener('input', function(e) {
          var field = e.target.closest('.form-field');
          if (field) {
            field.classList.remove('has-error');
            var err = field.querySelector('.form-error');
            if (err) err.hidden = true;
          }
        });

        // Multi-page navigation
        function showPage(idx) {
          allPages.forEach(function(p, i) { p.hidden = i !== idx; });
          currentPageIdx = idx;
          // Scroll to form top
          form.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function resolveNextPage(pageEl) {
          var rules = pageEl.getAttribute('data-next-rules');
          if (!rules) return currentPageIdx + 1;
          try {
            var parsed = JSON.parse(rules.replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>'));
            for (var i = 0; i < parsed.length; i++) {
              var rule = parsed[i];
              if (rule.default) {
                var tgt = findPageIdx(rule.goto);
                if (tgt !== -1) return tgt;
              }
              if (rule.when && rule.goto) {
                if (evalCond(rule.when)) {
                  var t = findPageIdx(rule.goto);
                  if (t !== -1) return t;
                }
              }
            }
          } catch(e) {}
          return currentPageIdx + 1;
        }

        function findPageIdx(pageId) {
          for (var i = 0; i < allPages.length; i++) {
            if (allPages[i].getAttribute('data-page') === pageId) return i;
          }
          return -1;
        }

        // Back buttons
        form.querySelectorAll('.form-prev').forEach(function(btn) {
          btn.addEventListener('click', function() { showPage(currentPageIdx - 1); });
        });

        // Continue buttons
        form.querySelectorAll('.form-next').forEach(function(btn) {
          btn.addEventListener('click', function() {
            if (!validatePage(allPages[currentPageIdx])) return;
            var next = resolveNextPage(allPages[currentPageIdx]);
            if (next < allPages.length) showPage(next);
          });
        });

        // Submit
        form.querySelectorAll('.form-submit').forEach(function(btn) {
          btn.addEventListener('click', function() {
            if (!validatePage(allPages[currentPageIdx])) return;
            if (honeypotInput && honeypotInput.value) {
              // Bot detected — fake success
              allPages.forEach(function(p) { p.hidden = true; });
              thankYouEl.hidden = false;
              return;
            }

            btn.disabled = true;
            btn.textContent = 'Submitting...';

            var payload = collectPayload();
            fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            }).then(function(res) {
              if (!res.ok) throw new Error('Submission failed');
              if (redirectUrl) {
                window.location.href = redirectUrl;
              } else {
                allPages.forEach(function(p) { p.hidden = true; });
                thankYouEl.hidden = false;
              }
            }).catch(function() {
              btn.disabled = false;
              btn.textContent = btn.getAttribute('data-original-label') || 'Submit';
              var errDiv = document.createElement('div');
              errDiv.className = 'form-error';
              errDiv.textContent = 'Something went wrong. Please try again.';
              errDiv.style.textAlign = 'center';
              errDiv.style.marginTop = 'var(--space-md)';
              var existing = form.querySelector('.form-submit-error');
              if (existing) existing.remove();
              errDiv.classList.add('form-submit-error');
              btn.parentNode.appendChild(errDiv);
            });
          });
          // Store original label
          btn.setAttribute('data-original-label', btn.textContent);
        });

        function collectPayload() {
          var fields = {};
          form.querySelectorAll('[name]').forEach(function(input) {
            if (input.name === 'sitemd_hp') return;
            var fieldEl = input.closest('.form-field');
            // Skip hidden conditional fields (but not type=hidden)
            if (fieldEl && (fieldEl.hidden || fieldEl.closest('[hidden]'))) return;
            // Skip display-only
            if (fieldEl && fieldEl.classList.contains('form-display')) return;

            var name = input.name;
            var val;

            if (input.type === 'radio') {
              if (!input.checked) return;
              val = input.value;
            } else if (input.type === 'checkbox') {
              if (!input.checked) return;
              // Build array
              if (!fields[name]) fields[name] = [];
              fields[name].push(input.value);
              return;
            } else {
              val = input.value;
            }

            // Handle composite names: "address.street" → { address: { street: val } }
            if (name.indexOf('.') !== -1) {
              var parts = name.split('.');
              if (!fields[parts[0]]) fields[parts[0]] = {};
              fields[parts[0]][parts[1]] = val;
            } else {
              fields[name] = val;
            }
          });

          return {
            formId: form.getAttribute('data-form-id'),
            submittedAt: new Date().toISOString(),
            page: {
              title: document.title,
              url: window.location.href,
            },
            fields: fields,
            meta: {
              referrer: document.referrer,
              userAgent: navigator.userAgent,
              locale: navigator.language,
            },
          };
        }

        // Answer piping — replace {{fieldId}} in labels/descriptions
        // Only target labels/descriptions that contain piping tokens; skip
        // .form-option labels (radio/checkbox wrappers) to avoid clobbering inputs.
        var _pipeTargets = [];
        form.querySelectorAll('label:not(.form-option):not(.form-star), .form-description').forEach(function(el) {
          if (/\{\{\w+\}\}/.test(el.innerHTML)) {
            el._origHtml = el.innerHTML;
            _pipeTargets.push(el);
          }
        });
        function pipeAnswers() {
          _pipeTargets.forEach(function(el) {
            el.innerHTML = el._origHtml.replace(/\{\{(\w+)\}\}/g, function(_, id) {
              return getFieldValue(id) || '';
            });
          });
        }
        if (_pipeTargets.length) {
          form.addEventListener('input', pipeAnswers);
          form.addEventListener('change', pipeAnswers);
        }
      });
    }
    initForms();

    // Search
    var _searchIndex = null;


    var pageSvg = '<svg class="search-page-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

    // Fuzzy match — returns true if needle approximately matches a substring of haystack.
    // Intended for short strings (titles, headings). Do NOT call against page bodies —
    // the sliding-window editDist is O(haystack * needle) and pins the main thread.
    function fuzzyContains(needle, haystack, maxDist) {
      if (haystack.indexOf(needle) !== -1) return true;
      if (needle.length < 3) return false;
      if (maxDist === undefined) maxDist = needle.length >= 6 ? 2 : 1;
      var nl = needle.length;
      for (var i = 0; i <= haystack.length - nl + maxDist; i++) {
        var end = Math.min(i + nl + maxDist, haystack.length);
        if (editDist(needle, haystack, i, end) <= maxDist) return true;
      }
      return false;
    }
    // Two-row Levenshtein with reusable Int16 buffers — no per-call array-of-arrays allocation.

          renderResults(input.value.trim());
          var el = resultsEl.querySelector('.search-result.active, .search-section-header.active');
          if (el) el.scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter' && activeIdx >= 0 && allResults[activeIdx]) {
          e.preventDefault();
          selectResult(allResults[activeIdx], input.value.trim());
        }
      });

      resultsEl.addEventListener('click', function(e) {
        var link = e.target.closest('.search-result, .search-section-header');
        if (!link) return;
        e.preventDefault();
        var idx = parseInt(link.getAttribute('data-idx'));
        if (allResults[idx]) selectResult(allResults[idx], input.value.trim());
      });

      function onDocClick(e) {
        if (wrap.classList.contains('is-open') && !wrap.contains(e.target)) {
          closeSearch();
        }
      }
      document.addEventListener('click', onDocClick);
      _sidebarSearchCleanup = function() { document.removeEventListener('click', onDocClick); };

      if (!_searchIndex) {
        fetch('/search-index.json').then(function(r) { return r.json(); }).then(function(data) {
          _searchIndex = data;
        });
      }
    }
    initSidebarSearch();

    // Lightbox — fullscreen image viewer with group navigation
    function getImgTransforms(imgEl) {
      if (!imgEl) return '';
      var parts = [];
      if (imgEl.style.filter) parts.push('filter:' + imgEl.style.filter);
      if (imgEl.style.borderRadius) parts.push('border-radius:' + imgEl.style.borderRadius);
      if (imgEl.style.aspectRatio) parts.push('aspect-ratio:' + imgEl.style.aspectRatio);
      if (imgEl.style.objectFit) parts.push('object-fit:' + imgEl.style.objectFit);
      var rotate = imgEl.closest('.img-rotate');
      if (rotate) {
        var deg = rotate.getAttribute('data-rotate');
        if (deg) parts.push('transform:rotate(' + deg + 'deg)');
      } else if (imgEl.style.transform) {
        parts.push('transform:' + imgEl.style.transform);
      }
      return parts.join(';');
    }
    function initLightbox() {
      var overlay = document.getElementById('lightbox-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'lightbox-overlay';
        overlay.className = 'lightbox-overlay';
        overlay.hidden = true;
        overlay.innerHTML = '<button class="lightbox-close" aria-label="Close">&times;</button>' +
          '<button class="lightbox-prev" aria-label="Previous">&lsaquo;</button>' +
          '<img src="" alt="">' +
          '<button class="lightbox-next" aria-label="Next">&rsaquo;</button>' +
          '<div class="lightbox-caption"></div>';
        document.body.appendChild(overlay);

        var img = overlay.querySelector('img');
        var caption = overlay.querySelector('.lightbox-caption');
        var prevBtn = overlay.querySelector('.lightbox-prev');
        var nextBtn = overlay.querySelector('.lightbox-next');
        var group = [];
        var idx = 0;

        function show(i) {
          idx = i;
          img.src = group[i].src;
          img.alt = group[i].alt;
          img.style.filter = '';
          img.style.transform = '';
          img.style.borderRadius = '';
          img.style.aspectRatio = '';
          img.style.objectFit = '';
          // Apply source image transforms (filter, rotation) to lightbox view
          if (group[i].transforms) {
            var pairs = group[i].transforms.split(';');
            for (var p = 0; p < pairs.length; p++) {
              var kv = pairs[p].split(':');
              if (kv.length >= 2) img.style[kv[0].trim()] = kv.slice(1).join(':').trim();
            }
          }
          caption.textContent = group[i].alt || '';
          caption.style.display = group[i].alt ? '' : 'none';
          prevBtn.style.display = group.length > 1 ? '' : 'none';
          nextBtn.style.display = group.length > 1 ? '' : 'none';
        }

        function open(src, alt, grp, startIdx) {
          group = grp || [{ src: src, alt: alt }];
          show(startIdx || 0);
          overlay.hidden = false;
        }

        function close() {
          overlay.hidden = true;
          img.src = '';
        }

        overlay.querySelector('.lightbox-close').addEventListener('click', close);
        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) close();
        });
        prevBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          show((idx - 1 + group.length) % group.length);
        });
        nextBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          show((idx + 1) % group.length);
        });

        document.addEventListener('keydown', function(e) {
          if (overlay.hidden) return;
          if (e.key === 'Escape') close();
          if (e.key === 'ArrowLeft' && group.length > 1) show((idx - 1 + group.length) % group.length);
          if (e.key === 'ArrowRight' && group.length > 1) show((idx + 1) % group.length);
        });

        window.__lightboxOpen = open;
      }

      // Bind click handlers to all data-lightbox triggers
      document.querySelectorAll('[data-lightbox]').forEach(function(el) {
        if (el._lightboxBound) return;
        el._lightboxBound = true;
        el.addEventListener('click', function(e) {
          e.preventDefault();
          var groupName = el.getAttribute('data-lightbox-group');
          if (groupName) {
            var items = Array.from(document.querySelectorAll('[data-lightbox-group="' + groupName + '"]'));
            var grp = items.map(function(a) {
              var srcImg = a.querySelector('img');
              return { src: a.getAttribute('href'), alt: srcImg ? srcImg.alt : '', transforms: getImgTransforms(srcImg) };
            });
            var startIdx = items.indexOf(el);
            window.__lightboxOpen(el.getAttribute('href'), '', grp, startIdx >= 0 ? startIdx : 0);
          } else {
            var srcImg = el.querySelector('img');
            var t = getImgTransforms(srcImg);
            window.__lightboxOpen(el.getAttribute('href'), srcImg ? srcImg.alt : '', [{ src: el.getAttribute('href'), alt: srcImg ? srcImg.alt : '', transforms: t }], 0);
          }
        });
      });
    }
    initLightbox();

    // Card carousels — Instagram-style image cycling
    function initCarousels() {
      document.querySelectorAll('[data-carousel]').forEach(function(el) {
        if (el._carouselInit) return;
        el._carouselInit = true;
        var slides = el.querySelectorAll('.card-carousel-slide');
        var dots = el.querySelectorAll('.card-carousel-dot');
        var prev = el.querySelector('.card-carousel-prev');
        var next = el.querySelector('.card-carousel-next');
        var current = 0;
        var count = slides.length;
        function go(i) {
          slides[current].classList.remove('card-carousel-slide--active');
          dots[current].classList.remove('card-carousel-dot--active');
          current = (i + count) % count;
          slides[current].classList.add('card-carousel-slide--active');
          dots[current].classList.add('card-carousel-dot--active');
        }
        prev.addEventListener('click', function(e) { e.stopPropagation(); e.preventDefault(); go(current - 1); });
        next.addEventListener('click', function(e) { e.stopPropagation(); e.preventDefault(); go(current + 1); });
        dots.forEach(function(dot) {
          dot.addEventListener('click', function(e) {
            e.stopPropagation(); e.preventDefault();
            go(parseInt(dot.getAttribute('data-index')));
          });
        });
        var startX = 0, startY = 0;
        el.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
        el.addEventListener('touchend', function(e) {
          var dx = e.changedTouches[0].clientX - startX;
          var dy = e.changedTouches[0].clientY - startY;
          if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) go(dx < 0 ? current + 1 : current - 1);
        }, { passive: true });
        // Click image → open lightbox with all carousel images as a group
        var imgs = el.querySelectorAll('.card-carousel-slide img');
        var group = Array.from(imgs).map(function(img) {
          return { src: img.src, alt: img.alt || '', transforms: '' };
        });
        imgs.forEach(function(img, i) {
          img.style.cursor = 'zoom-in';
          img.addEventListener('click', function(e) {
            e.stopPropagation(); e.preventDefault();
            if (window.__lightboxOpen) window.__lightboxOpen(group[i].src, group[i].alt, group, i);
          });
        });
      });
    }
    initCarousels();

    // Tooltips — mobile tap-to-toggle
    function initTooltips() {
      document.querySelectorAll('.tooltip').forEach(function(el) {
        if (el._ttInit) return;
        el._ttInit = true;
        el.addEventListener('click', function(e) {
          if (!('ontouchstart' in window)) return;
          e.preventDefault();
          var tip = el.querySelector('.tooltip-content');
          var isVisible = tip.style.display === 'block';
          // Close all other tooltips
          document.querySelectorAll('.tooltip-content').forEach(function(tc) { tc.style.display = ''; });
          tip.style.display = isVisible ? '' : 'block';
        });
      });
    }
    initTooltips();
    // Close tooltips on outside tap
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.tooltip')) {
        document.querySelectorAll('.tooltip-content').forEach(function(tc) { tc.style.display = ''; });
      }
    });

    // Modals — overlay with tabbed content
    function initModals() {
      // Tab switching
      document.querySelectorAll('.modal-tabs .modal-tab').forEach(function(tab) {
        if (tab._modalInit) return;
        tab._modalInit = true;
        tab.addEventListener('click', function() {
          var dialog = tab.closest('.modal-dialog');
          dialog.querySelectorAll('.modal-tab').forEach(function(t) { t.classList.remove('is-active'); });
          dialog.querySelectorAll('.modal-body').forEach(function(b) { b.hidden = true; });
          tab.classList.add('is-active');
          var target = dialog.querySelector('.modal-body[data-tab="' + tab.getAttribute('data-tab') + '"]');
          if (target) target.hidden = false;
        });
      });

      // Close buttons
      document.querySelectorAll('.modal-close').forEach(function(btn) {
        if (btn._modalInit) return;
        btn._modalInit = true;
        btn.addEventListener('click', function() {
          btn.closest('.modal-overlay').hidden = true;
          document.body.style.overflow = '';
        });
      });

      // Backdrop click to close
      document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
        if (overlay._modalInit) return;
        overlay._modalInit = true;
        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) {
            overlay.hidden = true;
            document.body.style.overflow = '';
          }
        });
      });

      // Trigger links
      document.querySelectorAll('[data-modal-trigger]').forEach(function(link) {
        if (link._modalInit) return;
        link._modalInit = true;
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var id = link.getAttribute('data-modal-trigger');
          var modal = document.querySelector('.modal-overlay[data-modal-id="' + id + '"]');
          if (modal) {
            modal.hidden = false;
            document.body.style.overflow = 'hidden';
            var closeBtn = modal.querySelector('.modal-close');
            if (closeBtn) closeBtn.focus();
          }
        });
      });
    }
    initModals();
    // Esc to close modals (single global listener)
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var open = document.querySelector('.modal-overlay:not([hidden])');
        if (open) {
          open.hidden = true;
          document.body.style.overflow = '';
        }
      }
    });

    // Instant navigation — swap content without full page reload
    (function() {
      // Guard against multiple instantiations (layout scripts may be re-evaluated on reload)
      if (window.__sitemdNavInit) return;
      window.__sitemdNavInit = true;

      var cache = {};
      var parser = new DOMParser();
      var swapping = false;

      // Expose hooks for dev panel integration
      window.__sitemdClearCache = function() { cache = {}; };
      window.__sitemdNavigate = function(slug) {
        var url = location.origin + slug;
        if (cache[url]) { swap(cache[url], url, true); return; }
        fetch(url).then(function(r) { return r.text(); }).then(function(html) {
          cache[url] = html;
          swap(html, url, true);
        }).catch(function() { location.href = url; });
      };

      function isLocal(a) {
        return a.hostname === location.hostname && !a.hasAttribute('download')
          && !a.getAttribute('href').startsWith('#')
          && a.target !== '_blank'
          && !a.hasAttribute('data-lightbox');
      }

      function swap(html, url, push) {
        // Re-entrance guard — prevent recursive swap calls
        if (swapping) return;
        swapping = true;
        try {
          var doc = parser.parseFromString(html, 'text/html');
          var newMain = doc.querySelector('#main');
          var newTitle = doc.querySelector('title');
          if (!newMain) { location.href = url; return; }

          // Scroll to top instantly before swapping content
          var hash = new URL(url, location.origin).hash;
          if (!hash) {
            document.documentElement.style.scrollBehavior = 'auto';
            document.documentElement.scrollTop = 0;
            document.documentElement.style.scrollBehavior = '';
          }

          // Preserve sidebar scroll position across navigation
          var sidebarAside = document.querySelector('.sidebar-aside');
          var sidebarScroll = sidebarAside ? sidebarAside.scrollTop : 0;

          // If both pages have a sidebar layout, swap only the article content
          // to preserve the sidebar DOM and scroll position
          var curContent = document.querySelector('#main .content');
          var newContent = newMain.querySelector('.content');
          if (curContent && newContent && sidebarAside && newMain.classList.contains('site-main--sidebar')) {
            curContent.replaceWith(newContent);
            // Re-execute inline scripts in swapped content
            newContent.querySelectorAll('script').forEach(function(oldScript) {
              var s = document.createElement('script');
              if (oldScript.src) { s.src = oldScript.src; } else { s.textContent = oldScript.textContent; }
              oldScript.replaceWith(s);
            });
            // Check if sidebar content changed (different sidebar group)
            var newSidebarAside = newMain.querySelector('.sidebar-aside');
            var curNav = sidebarAside.querySelector('.sidebar-nav');
            var newNav = newSidebarAside ? newSidebarAside.querySelector('.sidebar-nav') : null;
            if (newNav && curNav && newNav.innerHTML !== curNav.innerHTML) {
              curNav.innerHTML = newNav.innerHTML;
              sidebarScroll = 0;
            }
            // Update sidebar active link
            var newPath = new URL(url, location.origin).pathname;
            document.querySelectorAll('.sidebar-nav a:not(.btn)').forEach(function(a) {
              var href = a.getAttribute('href');
              if (href.includes('#')) {
                a.classList.remove('active');
              } else {
                a.classList.toggle('active', href === newPath);
              }
            });
            // Expand active page's anchors, collapse others if default is collapsed
            document.querySelectorAll('.sidebar-anchors').forEach(function(container) {
              var link = container.querySelector(':scope > a');
              var btn = container.querySelector('.sidebar-anchors-toggle');
              var list = container.querySelector('.sidebar-anchors-list');
              if (!link || !btn || !list) return;
              var isActive = link.classList.contains('active');
              if (isActive) {
                btn.setAttribute('aria-expanded', 'true');
                list.removeAttribute('hidden');
              } else if (btn.getAttribute('aria-expanded') === 'true') {
                // Collapse non-active items that were auto-expanded
                btn.setAttribute('aria-expanded', 'false');
                list.hidden = true;
              }
            });
          } else {
            // Different layout — replace entire main
            document.getElementById('main').replaceWith(newMain);
            // Re-execute inline scripts in swapped content
            newMain.querySelectorAll('script').forEach(function(oldScript) {
              var s = document.createElement('script');
              if (oldScript.src) { s.src = oldScript.src; } else { s.textContent = oldScript.textContent; }
              oldScript.replaceWith(s);
            });
          }

          // Restore sidebar scroll position, then ensure active link is visible
          sidebarAside = document.querySelector('.sidebar-aside');
          if (sidebarAside) {
            sidebarAside.scrollTop = sidebarScroll;
            var activeLink = sidebarAside.querySelector('.sidebar-nav > a.active, .sidebar-anchors > a.active');
            if (activeLink) {
              var aRect = activeLink.getBoundingClientRect();
              var sRect = sidebarAside.getBoundingClientRect();
              if (aRect.top < sRect.top || aRect.bottom > sRect.bottom) {
                activeLink.scrollIntoView({ block: 'center' });
              }
            }
          }

          if (newTitle) document.title = newTitle.textContent;

          // Update meta description
          var newDesc = doc.querySelector('meta[name="description"]');
          var curDesc = document.querySelector('meta[name="description"]');
          if (newDesc && curDesc) curDesc.setAttribute('content', newDesc.getAttribute('content'));

          // Update canonical URL
          var newCanonical = doc.querySelector('link[rel="canonical"]');
          var curCanonical = document.querySelector('link[rel="canonical"]');
          if (newCanonical && curCanonical) curCanonical.setAttribute('href', newCanonical.getAttribute('href'));

          // Update OG and Twitter meta tags
          ['og:title','og:description','og:url','og:image','og:type'].forEach(function(p) {
            var nw = doc.querySelector('meta[property="' + p + '"]');
            var cu = document.querySelector('meta[property="' + p + '"]');
            if (nw && cu) cu.setAttribute('content', nw.getAttribute('content'));
          });
          ['twitter:title','twitter:description','twitter:image'].forEach(function(n) {
            var nw = doc.querySelector('meta[name="' + n + '"]');
            var cu = document.querySelector('meta[name="' + n + '"]');
            if (nw && cu) cu.setAttribute('content', nw.getAttribute('content'));
          });

          // Update sidebar if present (for non-sidebar layout pages)
          var newSidebar = doc.querySelector('.page-sidebar');
          var curSidebar = document.querySelector('.page-sidebar');
          if (newSidebar && curSidebar) curSidebar.replaceWith(newSidebar);
          else if (newSidebar && !curSidebar) newMain.after(newSidebar);
          else if (!newSidebar && curSidebar) curSidebar.remove();

          // Update active nav links
          document.querySelectorAll('.site-nav a').forEach(function(a) {
            a.classList.toggle('active', a.getAttribute('href') === new URL(url).pathname);
          });

          if (push) history.pushState(null, '', url);
          if (hash) {
            var el = document.getElementById(hash.slice(1));
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          }
          initCopyButtons();
          initLightbox();
          initCarousels();
          initRotatedImages();
          initForms();
          initTooltips();
          initModals();
          updateMobileSidebar();
          initSidebarSearch();
          initSidebarAnchors();
          updateAnchorActive();
          if (typeof initSidebarScroll === 'function') initSidebarScroll();
          if (window.__sitemdAuthCheck) window.__sitemdAuthCheck();
          // Close mobile menu if open
          var nav = document.getElementById('site-nav');
          if (nav.classList.contains('is-open')) {
            nav.classList.remove('is-open');
            document.querySelector('.mobile-menu-toggle').setAttribute('aria-expanded', 'false');
            document.documentElement.classList.remove('menu-open');
          }
        } finally {
          swapping = false;
        }
      }

      document.addEventListener('click', function(e) {
        var a = e.target.closest('a');
        if (!a || !isLocal(a) || e.ctrlKey || e.metaKey || e.shiftKey) return;
        var url = a.href;
        e.preventDefault();
        if (url === location.href) return;

        // Same-page hash navigation — just scroll, don't re-fetch/swap
        var parsed = new URL(url);
        if (parsed.pathname === location.pathname) {
          if (parsed.hash) {
            history.pushState(null, '', url);
            var el = document.getElementById(parsed.hash.slice(1));
            if (el) el.scrollIntoView({ behavior: 'smooth' });
            updateAnchorActive();
          } else if (location.hash) {
            // Clearing the hash by clicking the parent self-link — just update URL
            history.pushState(null, '', url);
            updateAnchorActive();
          }
          return;
        }

        if (cache[url]) { swap(cache[url], url, true); return; }
        fetch(url).then(function(r) { return r.text(); }).then(function(html) {
          cache[url] = html;
          swap(html, url, true);
        }).catch(function() { location.href = url; });
      });

      window.addEventListener('popstate', function() {
        var url = location.href;
        if (cache[url]) { swap(cache[url], url, false); return; }
        fetch(url).then(function(r) { return r.text(); }).then(function(html) {
          cache[url] = html;
          swap(html, url, false);
        }).catch(function() { location.reload(); });
      });
    })();

    // Re-scroll to hash after lazy images load and settle layout
    (function() {
      if (!location.hash) return;
      window.addEventListener('load', function() {
        var el;
        try { el = document.querySelector(location.hash); } catch (e) {}
        if (el) {
          el.scrollIntoView();
          setTimeout(function() { el.scrollIntoView(); }, 300);
        }
      });
    })();

    // Auto-resize Twitter/X embed iframes via postMessage
    window.addEventListener('message', function(e) {
      var data = e.data;
      if (!data || typeof data !== 'object' || !data['twttr.embed']) return;
      var msg = data['twttr.embed'];
      if (typeof msg.method !== 'string' || msg.method.indexOf('resize') === -1) return;
      var params = msg.params;
      if (!params || !params[0] || !params[0].height) return;
      var height = params[0].height;
      var iframes = document.querySelectorAll('.embed--tweet iframe');
      for (var i = 0; i < iframes.length; i++) {
        if (iframes[i].contentWindow === e.source) {
          iframes[i].style.height = Math.ceil(height) + 'px';
          break;
        }
      }
    });
  </script>
</body>
